name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DATABASE_URL,JWT_SECRET,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,CLOUDINARY_URL,EMAIL_USER,EMAIL_HOST,EMAIL_PASS,EMAIL_PORT
          script: |


            REPO_DIR="$HOME/congo-sphere-backend"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git pull origin main
            else
              git clone --branch main "$REPO_URL" "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            # ── Write .env from secrets ──────────────────────────────────────
            cat > .env <<EOF
            PORT=3000
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
            CLOUDINARY_URL=${CLOUDINARY_URL}
            EMAIL_USER=${EMAIL_USER}
            EMAIL_HOST=${EMAIL_HOST}
            EMAIL_PASS=${EMAIL_PASS}
            EMAIL_PORT=${EMAIL_PORT}
            EOF

            # ── Build ────────────────────────────────────────────────────────
            sudo docker build -t congo-sphere .

            # ── Swap container (zero-downtime swap) ──────────────────────────
            sudo docker stop congo-sphere-old 2>/dev/null || true
            sudo docker rm congo-sphere-old 2>/dev/null || true
            sudo docker rename congo-sphere congo-sphere-old 2>/dev/null || true

            sudo docker run -d \
              --name congo-sphere \
              --restart unless-stopped \
              --env-file .env \
              -p 3000:3000 \
              congo-sphere

            # Verify new container started before removing old one
            sleep 3
            if sudo docker ps --filter "name=congo-sphere" --filter "status=running" | grep -q congo-sphere; then
              sudo docker stop congo-sphere-old 2>/dev/null || true
              sudo docker rm congo-sphere-old 2>/dev/null || true
            else
              echo "New container failed to start, rolling back..."
              sudo docker stop congo-sphere 2>/dev/null || true
              sudo docker rm congo-sphere 2>/dev/null || true
              sudo docker rename congo-sphere-old congo-sphere 2>/dev/null || true
              sudo docker start congo-sphere
              exit 1
            fi

            # ── Cleanup dangling images ──────────────────────────────────────
            sudo docker image prune -f
